{% extends "base.html" %}

{% block title %}Νέο Post - Blog{% endblock %}

{% block content %}
<h1>✍️ Νέο Post</h1>

<form method="POST" action="{{ url_for('new_post') }}">
     <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
    <div class="form-group">
    <label for="title">Τίτλος:</label>
    <input type="text" id="title" name="title" 
           minlength="3" maxlength="200"
           required>
</div>

<div class="form-group">
    <label for="content">Περιεχόμενο:</label>
    <textarea id="content" name="content" 
              minlength="10" maxlength="10000"
              required></textarea>
</div>
    
    <button type="submit" class="btn">Δημοσίευση</button>
    <a href="{{ url_for('index') }}" class="btn" style="background: #6c757d;">Ακύρωση</a>
</form>

{% endblock %}
