{% extends "base.html" %}

{% block title %}Εγγραφή - Blog{% endblock %}

{% block content %}
<h1>📝 Εγγραφή Νέου Χρήστη</h1>

<form method="POST" action="{{ url_for('register') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
    <div class="form-group">
    <label for="username">Username:</label>
    <input type="text" id="username" name="username" 
           pattern="[a-zA-Z0-9_]{3,20}" 
           title="3-20 χαρακτήρες, μόνο γράμματα, αριθμοί και underscore"
           required autofocus>
</div>

<div class="form-group">
    <label for="email">Email:</label>
    <input type="email" id="email" name="email" 
           maxlength="100"
           required>
</div>

<div class="form-group">
    <label for="password">Password:</label>
    <input type="password" id="password" name="password" 
           minlength="7"
           title="Τουλάχιστον 7 χαρακτήρες"
           required>
</div>
    
    <button type="submit" class="btn">Εγγραφή</button>
    <a href="{{ url_for('index') }}" class="btn" style="background: #6c757d;">Ακύρωση</a>
</form>

<p style="margin-top: 20px; color: #666;">
    Έχεις ήδη λογαριασμό; <a href="{{ url_for('login') }}">Συνδέσου εδώ</a>
</p>

{% endblock %}
